---
- name: Transfert etcd binary to /usr/local/bin/ on ansible hosts
  ansible.builtin.copy: 
    src: "/tmp/etcd-v3.5.0-linux-amd64/{{ item }}"
    dest: "/usr/local/bin/"
  with_items: 
    - etcd 
    - etcdctl
    - etcdutl 

- name: Activate executable bit for etcd binaries
  ansible.builtin.file: 
    dest: "/usr/local/bin/{{ item }}"
    mode: "0755"
  with_items: 
    - etcd 
    - etcdctl
    - etcdutl 

